[module/textovazio]
type = custom/text
content = " "

[module/powermenu] 
type = custom/script 
exec = echo "ÔÄĎ" 
click-left = ~/MeuSetup/scripts/powermenu.sh

[module/wifi]
type = custom/script
format-prefix = "Ôáę "
format-prefix-foreground = ${colors.foreground}
exec = nmcli -t -f NAME connection show --active | head -n 1 | grep -v 'lo' || echo "Desconectado"
interval = 3

[module/bateria]
type = internal/battery
battery = BAT0
poll-interval = 5

format-charging = <ramp-capacity> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = ÔČÄ %percentage%%

ramp-capacity-0 = ÔČĄ
ramp-capacity-1 = ÔČÉ
ramp-capacity-2 = ÔČā
ramp-capacity-3 = ÔČĀ
ramp-capacity-4 = ÔČÄ

[module/systray]
type = internal/tray
tray-position = right
format-margin = 4px
tray-spacing = 4px

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.foreground}
label-active-padding = 1
 
label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1


[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix-foreground = ${colors.foreground}
format-volume = <ramp-volume> <label-volume>
use-ui-max = false

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = ÔÄ¶
ramp-volume-1 = ÔÄß
ramp-volume-2 = ÔÄ®

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÔĒł "
format-prefix-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôčõ "
format-prefix-foreground = ${colors.foreground}

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %d/%m/%Y

label = %date%
label-foreground = ${colors.foreground}

[module/bitcoin] 
type = custom/script 
exec = echo "ÔÖö" 
click-left = ~/MeuSetup/scripts/btc-scripts/btc-dropdown.py

[module/vpn]
type = custom/script
format-prefix = "ÔĄ≤ "
exec = ~/MeuSetup/scripts/vpn-status.sh
interval = 2

click-left = ~/MeuSetup/scripts/vpn-toggle.sh
click-right = ~/MeuSetup/scripts/vpn-switch.sh

[module/habito]
type = custom/script
exec = ~/MeuSetup/scripts/Calendario-scripts/calendario.py
interval = 6000

click-left = ~/MeuSetup/scripts/Calendario-scripts/calendario.py popup

[settings]
screenchange-reload = true
pseudo-transparency = true
